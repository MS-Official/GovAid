events { worker_connections 1024; }

http {
    # ─── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";

    # ─── Redirect HTTP → HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── Public API Gateway (WSO2 HTTPS port 8243) ─────────────────────────
    server {
        listen 443 ssl;
        server_name govaid-api.example.gov localhost;

        ssl_certificate     /etc/nginx/certs/govaid.crt;
        ssl_certificate_key /etc/nginx/certs/govaid.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
        ssl_session_cache   shared:SSL:10m;

        # Rate limiting at NGINX level (defense in depth)
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
        limit_req zone=api_limit burst=200 nodelay;

        location / {
            proxy_pass              https://wso2am:8243;
            proxy_ssl_verify        off;   # Use 'on' with proper WSO2 cert in prod
            proxy_read_timeout      120s;
            proxy_connect_timeout   30s;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto https;
        }
    }

    # ─── WSO2 Admin/Publisher Portal ───────────────────────────────────────
    # RESTRICT this to VPN / management IP range only
    server {
        listen 443 ssl;
        server_name govaid-admin.example.gov;

        ssl_certificate     /etc/nginx/certs/govaid.crt;
        ssl_certificate_key /etc/nginx/certs/govaid.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # ⚠️  Replace with your actual VPN/office CIDR
        allow  10.0.0.0/8;
        allow  192.168.0.0/16;
        allow  172.16.0.0/12;
        deny   all;

        location / {
            proxy_pass          https://wso2am:9443;
            proxy_ssl_verify    off;
            proxy_set_header    Host            $host;
            proxy_set_header    X-Real-IP       $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
